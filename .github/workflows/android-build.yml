name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Ensure EXPO_TOKEN is set
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "::error::EXPO_TOKEN is not set. Please add it to your GitHub Repository Secrets."
            exit 1
          fi
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install

      - name: Install Expo CLI and EAS CLI
        run: npm install -g expo-cli eas-cli@latest

      - name: Run EAS Build for Android
        id: eas-build
        run: eas build -p android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Post-build instructions
        if: success()
        run: |
          echo "=================================================="
          echo "✅ Build completed successfully!"
          echo "=================================================="
          echo "Your Android APK has been generated by Expo EAS."
          echo ""
          echo "To download and install:"
          echo "1. Check the logs in the step 'Run EAS Build for Android' above."
          echo "   There should be a direct download link for the APK at the end."
          echo "2. Alternatively, visit your Expo dashboard at:"
          echo "   👉 https://expo.dev/"
          echo "   Navigate to your project > 'Builds' to find your APK."
        shell: bash
